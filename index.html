<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | JavaScript fundamental | Challenge 3</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="main.js"></script>
</head>

<body>
  <main class="main" data-loading="true">
    <header class="control-card">
      <div class="control-card__user">
        <div class="user-avatar" skeleton>
          <img src="images/image-jeremy.png" alt="Jeremy Robson">
        </div>
        <div class="user-information" skeleton>
          <span class="user-information__report">Report for</span>
          <h1 class="user-information__name">Jeremy Robson</h1>
        </div>
      </div>
      <nav class="control-card__nav">
        <ul class="filter-list">
          <li>
            <button class="btn btn--nav active" name="daily" type="button" skeleton>Daily</button>
          </li>
          <li>
            <button class="btn btn--nav" name="weekly" type="button" skeleton>Weekly</button>
          </li>
          <li>
            <button class="btn btn--nav" name="monthly" type="button" skeleton>Monthly</button>
          </li>
        </ul>
      </nav>
    </header>

    <section class="activities__card activities__card--work">
      <div class="activities__info">
        <div class="activities__info--top">
          <h2 class="activities__title" skeleton>Work</h2>
          <button aria-label="more options" type="button" class="btn btn--more activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </button>
        </div>
        <div class="activities__info--bottom" skeleton>
          <p class="activities__current">32hrs</p>
          <p class="activities__previous">Yesterday - 36hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--play">
      <div class="activities__info">
        <div class="activities__info--top" skeleton>
          <h2 class="activities__title">Play</h2>
          <button aria-label="more options" type="button" class="btn btn--more activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </button>
        </div>
        <div class="activities__info--bottom" skeleton>
          <p class="activities__current">10hrs</p>
          <p class="activities__previous">Yesterday - 8hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--study">
      <div class="activities__info">
        <div class="activities__info--top" skeleton>
          <h2 class="activities__title">Study</h2>
          <button aria-label="more options" type="button" class="btn btn--more activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </button>
        </div>
        <div class="activities__info--bottom" skeleton>
          <p class="activities__current">4hrs</p>
          <p class="activities__previous">Yesterday - 7hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--exercise">
      <div class="activities__info">
        <div class="activities__info--top" skeleton>
          <h2 class="activities__title">Exercise</h2>
          <button aria-label="more options" type="button" class="btn btn--more activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </button>
        </div>
        <div class="activities__info--bottom" skeleton>
          <p class="activities__current">4hrs</p>
          <p class="activities__previous">Yesterday - 5hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--social">
      <div class="activities__info">
        <div class="activities__info--top" skeleton>
          <h2 class="activities__title">Social</h2>
          <button aria-label="more options" type="button" class="btn btn--more activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </button>
        </div>
        <div class="activities__info--bottom" skeleton>
          <p class="activities__current">5hrs</p>
          <p class="activities__previous">Yesterday - 10hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--selfcare">
      <div class="activities__info">
        <div class="activities__info--top" skeleton>
          <h2 class="activities__title">Self Care</h2>
          <button aria-label="more options" type="button" class="btn btn--more activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </button>
        </div>
        <div class="activities__info--bottom" skeleton>
          <p class="activities__current">2hrs</p>
          <p class="activities__previous">Yesterday - 2hrs</p>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
