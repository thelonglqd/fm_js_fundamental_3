<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | JavaScript fundamental | Challenge 3</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="main.js"></script>
</head>

<body>
  <main class="main">
    <section class="user__filter">
      <div class="user">
        <div class="user__avatar">
          <img src="images/image-jeremy.png" alt="">
        </div>
        <div class="user__information">
          <p class="user__report">Report for</p>
          <p class="user__fullname">Jeremy Robson</p>
        </div>
      </div>
      <nav class="filter">
        <ul class="filter__list">
          <li class="filter__item">
            <a href="#">Daily</a>
          </li>
          <li class="filter__item">
            <a href="#">Weekly</a>
          </li>
          <li class="filter__item">
            <a href="#">Monthly</a>
          </li>
        </ul>
      </nav>
    </section>
    <section class="activities__card activities__card--work">
      <div class="activities__info">
        <div class="activities__info--top">
          <p class="activities__title">Work</p>
          <div class="activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </div>
        </div>
        <div class="activities__info--bottom">
          <p class="activities__current">32hrs</p>
          <p class="activities__previous">Last week - 36hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--play">
      <div class="activities__info">
        <div class="activities__info--top">
          <p class="activities__title">Play</p>
          <div class="activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </div>
        </div>
        <div class="activities__info--bottom">
          <p class="activities__current">10hrs</p>
          <p class="activities__previous">Last week - 8hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--study">
      <div class="activities__info">
        <div class="activities__info--top">
          <p class="activities__title">Study</p>
          <div class="activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </div>
        </div>
        <div class="activities__info--bottom">
          <p class="activities__current">4hrs</p>
          <p class="activities__previous">Last week - 7hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--exercise">
      <div class="activities__info">
        <div class="activities__info--top">
          <p class="activities__title">Exercise</p>
          <div class="activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </div>
        </div>
        <div class="activities__info--bottom">
          <p class="activities__current">4hrs</p>
          <p class="activities__previous">Last week - 5hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--social">
      <div class="activities__info">
        <div class="activities__info--top">
          <p class="activities__title">Social</p>
          <div class="activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </div>
        </div>
        <div class="activities__info--bottom">
          <p class="activities__current">5hrs</p>
          <p class="activities__previous">Last week - 10hrs</p>
        </div>
      </div>
    </section>

    <section class="activities__card activities__card--selfcare">
      <div class="activities__info">
        <div class="activities__info--top">
          <p class="activities__title">Self Care</p>
          <div class="activities__menu">
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
            <div class="activities__dot"></div>
          </div>
        </div>
        <div class="activities__info--bottom">
          <p class="activities__current">2hrs</p>
          <p class="activities__previous">Last week - 2hrs</p>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
